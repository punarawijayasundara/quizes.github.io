            card.className = 'question-card';
            card.id = `q-card-${q.id}`;
            
            let optionsHtml = '';
            for (let opt in q.options) {
                optionsHtml += `
                    <label>
                        <input type="radio" name="question-${q.id}" value="${opt}">
                        ${opt.toUpperCase()}. ${q.options[opt]}
                    </label>
                `;
            }

            card.innerHTML = `
                <span class="question-text">${index + 1}. ${q.q}</span>
                <div class="options">${optionsHtml}</div>
                <div id="feedback-${q.id}" class="feedback hidden"></div>
                <div id="rationale-${q.id}" class="rationale hidden">
                    <strong>Rationale:</strong> ${q.rationale}
                </div>
            `;
            container.appendChild(card);
        });
    }

        timer = setInterval(() => {

            if (timeLeft <= 0) {
                clearInterval(timer);
                checkAnswers(true);
                alert("Time is up! Your answers have been submitted.");
            }
            updateTimerDisplay();
        }, 1000);
    }

        const minutes = Math.floor((timeLeft % 3600) / 60);
        const seconds = timeLeft % 60;
        document.getElementById('timer').innerText = `Time Remaining: ${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }

        const form = document.getElementById('quiz-form');

        questions.forEach(q => {
            const selected = form.elements[`question-${q.id}`].value;
            const feedback = document.getElementById(`feedback-${q.id}`);
            const rationale = document.getElementById(`rationale-${q.id}`);

            // Logic: Only show feedback if a question has been answered (for Check Answers) 
            // OR if it's the final submission.
            if (selected || isFinal) {
                feedback.classList.remove('hidden');
                
                if (selected === q.correct) {
                    feedback.innerText = "Correct!";
                    feedback.className = "feedback correct-feedback";
                    score++;
                } else {
                    feedback.innerText = `Incorrect. (Correct Answer: ${q.correct.toUpperCase()})`;
                    feedback.className = "feedback incorrect-feedback";
                }

                // Show rationale for incorrect answers (Optional/Final)
                if (isFinal) {
                    rationale.classList.remove('hidden');

                    const inputs = document.getElementsByName(`question-${q.id}`);
                    inputs.forEach(i => i.disabled = true);

            } else {
                // If "Check Answers" but question is untouched, keep it hidden
                feedback.classList.add('hidden');
                rationale.classList.add('hidden');
            }
        });

        if (isFinal) {
            clearInterval(timer);
            const scoreDiv = document.getElementById('final-score');
            scoreDiv.innerText = `Final Score: ${score} / ${questions.length}`;
            scoreDiv.classList.remove('hidden');
            window.scrollTo(0, 0);
        }
