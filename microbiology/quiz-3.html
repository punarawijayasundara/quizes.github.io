<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microbiology: Viruses - Interactive Exam</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --light: #f4f7f6;
            --dark: #1a252f;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--light);
            color: var(--primary);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        header {
            text-align: center;
            border-bottom: 3px solid var(--primary);
            margin-bottom: 30px;
            padding-bottom: 15px;
        }

        #timer-banner {
            position: sticky;
            top: 10px;
            background: var(--dark);
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            z-index: 1000;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        #results-dashboard {
            display: none;
            background: #eef2f3;
            border: 2px solid var(--secondary);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            text-align: center;
        }

        .score-text { font-size: 2rem; font-weight: bold; color: var(--secondary); }

        .question-block {
            margin-bottom: 30px;
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid #ccc;
            background: #f9f9f9;
            transition: all 0.3s ease;
        }

        .options label {
            display: block;
            margin: 10px 0;
            padding: 12px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
        }

        .options label:hover { background-color: #f0f7ff; border-color: var(--secondary); }

        /* Correct/Incorrect States */
        .correct-block { border-left-color: var(--success) !important; background-color: #f0fff4 !important; }
        .incorrect-block { border-left-color: var(--danger) !important; background-color: #fff5f5 !important; }
        
        .correct-answer-text { color: var(--success); font-weight: bold; margin-top: 10px; display: none; }
        .rationale {
            font-size: 0.9rem;
            color: #444;
            margin-top: 10px;
            padding: 10px;
            background: #e9ecef;
            border-radius: 5px;
            display: none;
            border-left: 3px solid #666;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-start { background: var(--success); color: white; }
        .btn-submit { background: var(--primary); color: white; }
        .btn-check { background: var(--secondary); color: white; }

        #quiz-area { display: none; }
        .footer-controls { margin-top: 40px; display: flex; justify-content: center; gap: 20px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Microbiology: Viruses - Exam</h1>
        <p>1st Year BSc Nursing | Practice Paper</p>
    </header>

    <div id="timer-banner">Time Remaining: <span id="time">02:00:00</span></div>

    <div id="results-dashboard">
        <h2>Exam Complete</h2>
        <div class="score-text" id="final-score-display">0 / 50</div>
        <p id="percentage-display">0%</p>
        <p>Review your answers below. Correct answers and rationales are now visible.</p>
    </div>

    <div id="intro" style="text-align: center; padding: 50px 0;">
        <p>This exam consists of 50 questions. You have 120 minutes to complete it.</p>
        <button class="btn btn-start" onclick="startQuiz()">Start the Quiz</button>
    </div>

    <form id="quiz-area">
        <div id="questions-container"></div>
        <div class="footer-controls">
            <button type="button" class="btn btn-check" onclick="checkAttempted(false)">Check Current Progress</button>
            <button type="button" class="btn btn-submit" onclick="submitExam()">Submit Final Exam</button>
        </div>
    </form>
</div>

<script>
    const questions = [
        { q: "Before the 1930s, researchers referred to viruses as:", options: ["Contagium vivum fluidum (contagious fluid)", "Contagium vivum fluidum (invisible poison)", "Virus (intracellular parasite)", "Virion (fully developed particle)"], answer: 0, rationale: "The phrase was coined by Beijerinck to describe the infectious nature of the fluid." },
        { q: "What does 'obligatory intracellular parasite' mean for viruses?", options: ["Can synthesize proteins in media", "Require living host cells to multiply", "Use host energy by choice", "Live outside cells drawing nutrients"], answer: 1, rationale: "Viruses lack metabolic machinery and must be inside a living cell to replicate." },
        { q: "Which describes viral nucleic acid composition?", options: ["Contains both DNA and RNA", "Contains either DNA or RNA, never both", "Exclusively double-stranded DNA", "Lacks nucleic acids"], answer: 1, rationale: "Unlike cellular life, viruses are restricted to one type of nucleic acid." },
        { q: "Why must a virus take over host metabolism?", options: ["To synthesize artificial media", "To store pre-synthesized ATP", "They lack enzymes for protein synthesis and ATP generation", "To trigger immune responses"], answer: 2, rationale: "Viruses are essentially 'genetic blueprints' that need the host's 'factory' to build parts." },
        { q: "How is 'host range' defined?", options: ["Distance between hosts", "Spectrum of host cells a virus can infect", "Size difference", "Number of virions produced"], answer: 1, rationale: "Host range is determined by specific attachment sites on the host cell surface." },
        { q: "Which is true regarding viral specificity?", options: ["Infect multiple species simultaneously", "Incapable of crossing species barriers", "Infect specific cells of usually one host species", "Bacteriophages infect vertebrates"], answer: 2, rationale: "Viral attachment is like a lock and key; the virus fits specific receptors on specific cells." },
        { q: "Terminology for viruses infecting bacteria:", options: ["Virions", "Prions", "Bacteriophages", "Prophages"], answer: 2, rationale: "Bacteriophages (or phages) literally means 'bacteria eaters'." },
        { q: "General size range for viruses:", options: ["2 to 10 nm", "20 to 1000 nm", "1000 to 3000 nm", "10 to 100 μm"], answer: 1, rationale: "Viruses are submicroscopic, typically measured in nanometers (nm)." },
        { q: "Which virus approaches the size of small bacteria (mycoplasmas)?", options: ["Poliovirus", "Rabies virus", "Vaccinia virus", "Tobacco mosaic virus"], answer: 2, rationale: "Vaccinia (poxvirus) is among the largest, roughly 300nm." },
        { q: "A fully developed, infectious viral particle is a:", options: ["Capsomere", "Prophage", "Virion", "Capsid"], answer: 2, rationale: "A virion is the complete, final structure found outside the host cell." },
        { q: "Configurations of viral nucleic acid:", options: ["Exclusively ssRNA or ssDNA", "Can be ss or ds, linear or circular", "Always circular dsDNA", "Hybrid DNA-RNA strands"], answer: 1, rationale: "Viruses show incredible genetic diversity compared to eukaryotes." },
        { q: "Which virus contains 8 genome segments ('chromosomes')?", options: ["Human herpes virus", "Influenza virus", "Adenovirus", "Ebola virus"], answer: 1, rationale: "This segmented nature allows for 'antigenic shift' and new flu strains." },
        { q: "What determines the capsid structure?", options: ["Host lipids", "Viral nucleic acid", "Environmental pH", "Spikes"], answer: 1, rationale: "The viral genome contains the blueprints for the protein subunits." },
        { q: "The individual protein subunits of a capsid are:", options: ["Envelopes", "Virions", "Capsomeres", "Spikes"], answer: 2, rationale: "Capsomeres are the basic building blocks that assemble into the capsid." },
        { q: "Biological macromolecules in a viral envelope:", options: ["Lipids, proteins, and carbohydrates", "dsRNA and lipids", "Pure spikes", "Nucleases"], answer: 0, rationale: "The envelope is often derived from the host cell's plasma membrane." },
        { q: "Composition of viral spikes:", options: ["Lipid bilayers", "Carbohydrate-protein complexes", "Naked nucleic acids", "Single capsomeres"], answer: 1, rationale: "Spikes are glycoproteins used for identification and attachment." },
        { q: "Primary function of spikes:", options: ["Digest host DNA", "Protect from nucleases", "Attach to host cells", "Synthesize ATP"], answer: 2, rationale: "Spikes bind to specific receptors on the host cell membrane." },
        { q: "Function of the capsid in nonenveloped viruses:", options: ["Synthesize lipids", "Protect nucleic acid and promote attachment", "Survive on agar", "Act as reverse transcriptase"], answer: 1, rationale: "Without an envelope, the capsid itself must handle protection and entry." },
        { q: "Techniques revealing viral morphology:", options: ["Light microscopy/PCR", "Electron microscopy/X-ray crystallography", "Biochemical assays", "Tissue culturing"], answer: 1, rationale: "Viruses are too small for light microscopes; electron beams are required." },
        { q: "Structural arrangement of helical viruses:", options: ["20 triangular faces", "Hollow, cylindrical helical capsid", "Spherical lipid layer", "Polyhedral head/tail"], answer: 1, rationale: "The nucleic acid is wound like a spring inside a protein tube." },
        { q: "Example pair of helical viruses:", options: ["Adenovirus/Poliovirus", "Rabies/Ebola", "Influenza/Herpes", "Phages/TMV"], answer: 1, rationale: "Rabies is bullet-shaped; Ebola is long and filamentous." },
        { q: "Geometric configuration of an icosahedron:", options: ["12 faces/20 corners", "20 faces/12 corners", "Cylinder", "Spherical bubble"], answer: 1, rationale: "This is the most efficient way to package a genome in a symmetric shell." },
        { q: "Classic examples of polyhedral viruses:", options: ["Rabies/Ebola", "Influenza/Herpes", "Adenovirus/Poliovirus", "Phages/HIV"], answer: 2, rationale: "Most common viruses like cold viruses (adenovirus) are polyhedral." },
        { q: "Which is an enveloped helical virus?", options: ["Human herpes virus", "Influenza virus", "Poliovirus", "TMV"], answer: 1, rationale: "The influenza virus has a helical nucleocapsid surrounded by an envelope." },
        { q: "Morphological classification of Human Herpes Virus:", options: ["Naked helical", "Enveloped helical", "Enveloped polyhedral", "Complex"], answer: 2, rationale: "Herpes has an icosahedral core with a surrounding envelope." },
        { q: "Dual-structural nature of bacteriophages:", options: ["Helical head/Polyhedral tail", "No capsid", "Polyhedral head/Helical tail", "Multiple heads"], answer: 2, rationale: "The head holds the DNA; the tail acts as a syringe." },
        { q: "Where is the nucleic acid in a bacteriophage?", options: ["Tail fibers", "Tail sheath", "Base plate", "Polyhedral head"], answer: 3, rationale: "The head acts as the storage container for the genetic material." },
        { q: "Why is symptom-based classification unacceptable today?", options: ["No symptoms in animals", "Only infect one organ", "Same virus can cause different diseases", "Lysogenic cycles"], answer: 2, rationale: "Modern taxonomy uses genetics and structure for accuracy." },
        { q: "Suffix indicating a viral Family:", options: ["-virus", "-ales", "-viridae", "-phage"], answer: 2, rationale: "Example: Retroviridae." },
        { q: "Suffix identifying a viral Genus:", options: ["-viridae", "-ales", "-virus", "-phage"], answer: 2, rationale: "Example: Lentivirus." },
        { q: "Attributes defining a viral species:", options: ["Capsid symmetry/Spikes", "Genetic info and ecological niche", "Symptoms/Lipids", "Geography/Size"], answer: 1, rationale: "A species is a group of viruses sharing the same niche." },
        { q: "Viral subspecies designation:", options: ["Latin phrases", "Disease name", "Numbers (e.g., HIV-1)", "Researcher name"], answer: 2, rationale: "Numbers or letters help distinguish closely related strains." },
        { q: "Basis of Baltimore classification:", options: ["Capsid shape", "Envelope lipids", "mRNA production method", "Host range"], answer: 2, rationale: "It tracks how the virus gets to the protein-making stage." },
        { q: "Mechanism used by HIV (+ssRNA) to make DNA:", options: ["Reverse transcription", "Direct translation", "Lysis", "Hijacking"], answer: 0, rationale: "Reverse transcriptase turns RNA into DNA." },
        { q: "What is typically encoded by viral genes?", options: ["Host ribosomes", "Structural components (capsid)", "Host ATP", "Culture media"], answer: 1, rationale: "Viruses only carry genes for things the host can't provide." },
        { q: "Supplied entirely by the host cell:", options: ["mRNA/Capsomeres", "Reverse transcriptase", "Ribosomes, tRNA, energy", "DNA/Lipid envelopes"], answer: 2, rationale: "The host provides the translation machinery and fuel." },
        { q: "What might larger virions contain preformed?", options: ["Host ribosomes", "Mitochondria", "Enzymes or mRNA", "Polyhedral heads"], answer: 2, rationale: "Some carry enzymes needed for early replication stages." },
        { q: "Consequence for a host cell after viral exit:", options: ["Survives normally", "Divides faster", "Usually death/damage", "Reverts to prophage"], answer: 2, rationale: "The lytic process or budding usually exhausts or ruptures the cell." },
        { q: "Phage DNA length relative to E. coli genome:", options: ["1%", "6%", "50%", "100%"], answer: 1, rationale: "Viral genomes are tiny compared to their bacterial hosts." },
        { q: "Correct order of the lytic cycle:", options: ["Penetration, Attach, Mature, Biosynth, Release", "Attach, Biosynth, Penetration, Mature, Release", "Attachment, Penetration, Biosynthesis, Maturation, Release", "Entry, Lysis, Assembly"], answer: 2, rationale: "The virus must land, enter, build parts, assemble, and then escape." },
        { q: "What happens during 'Penetration'?", options: ["Attachment", "Biosynthesis", "Assembly", "Genetic material injection"], answer: 3, rationale: "The phage injects its DNA into the cytoplasm." },
        { q: "A latent, integrated phage is called a:", options: ["Virion", "Prophage", "Capsomere", "Naked virus"], answer: 1, rationale: "The 'pro-' indicates it is a precursor to an active phage." },
        { q: "Host DNA fate in lytic vs lysogenic:", options: ["Lytic: no hydrolysis; Lysogenic: hydrolysis", "Lytic: hydrolysis; Lysogenic: no hydrolysis", "Hydrolyzed in both", "Untouched in both"], answer: 1, rationale: "In the lytic cycle, the host's 'hard drive' is wiped to use the parts." },
        { q: "Viral DNA replication timing:", options: ["Lytic with host; Lysogenic independent", "Both dependent on division", "Lytic independent; Lysogenic with host", "Lytic is slow"], answer: 2, rationale: "In lysogeny, the virus 'hitches a ride' on the host's natural division." },
        { q: "Mechanism disruption level:", options: ["Lytic: total; Lysogenic: minor", "Lysogenic: total; Lytic: minor", "Both total", "Neither"], answer: 0, rationale: "Lytic is a full hijacking; lysogenic is a silent partnership." },
        { q: "Why can't viruses grow on agar?", options: ["No flagella", "Obligatory intracellular parasites", "pH issues", "Spikes don't stick"], answer: 1, rationale: "Agar isn't alive; viruses need living metabolism to replicate." },
        { q: "Methods for viral cultivation:", options: ["Broth/Blood agar", "Animals, Eggs, Cell cultures", "X-ray/PCR", "Lytic induction"], answer: 1, rationale: "These provide the living cells required for growth." },
        { q: "Outside host cells, viruses exist as:", options: ["Virions", "Algae", "Protozoa", "Bacteria"], answer: 0, rationale: "The virion is the inert, transport stage of the virus." },
        { q: "Viral genome is packaged in a structure of:", options: ["Protein", "Carbohydrate", "Fats", "Lipids"], answer: 0, rationale: "This structure is the protein capsid." },
        { q: "Capsid symmetry of most bacteriophages:", options: ["Helical", "Icosahedral", "Complex", "Spherical"], answer: 2, rationale: "They combine multiple shapes into one sophisticated machine." }
    ];

    let timerInterval;

    function renderQuestions() {
        const container = document.getElementById('questions-container');
        questions.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'question-block';
            div.id = `q-block-${index}`;
            div.innerHTML = `
                <strong>${index + 1}. ${item.q}</strong>
                <div class="options">
                    ${item.options.map((opt, i) => `
                        <label><input type="radio" name="q${index}" value="${i}"> ${String.fromCharCode(65+i)}) ${opt}</label>
                    `).join('')}
                </div>
                <div id="correct-text-${index}" class="correct-answer-text">Correct Answer: ${String.fromCharCode(65 + item.answer)}</div>
                <div id="rationale-${index}" class="rationale">${item.rationale}</div>
            `;
            container.appendChild(div);
        });
    }

    function startQuiz() {
        document.getElementById('intro').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        document.getElementById('timer-banner').style.display = 'block';
        renderQuestions();
        startTimer(120 * 60);
    }

    function startTimer(seconds) {
        const display = document.getElementById('time');
        timerInterval = setInterval(() => {
            let h = Math.floor(seconds / 3600);
            let m = Math.floor((seconds % 3600) / 60);
            let s = seconds % 60;
            display.textContent = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            if (--seconds < 0) { clearInterval(timerInterval); submitExam(); }
        }, 1000);
    }

    function checkAttempted(isFinal) {
        let score = 0;
        questions.forEach((q, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const block = document.getElementById(`q-block-${i}`);
            const rationale = document.getElementById(`rationale-${i}`);
            const correctText = document.getElementById(`correct-text-${i}`);

            if (selected) {
                const isCorrect = parseInt(selected.value) === q.answer;
                if (isCorrect) {
                    score++;
                    block.classList.add('correct-block');
                    block.classList.remove('incorrect-block');
                } else {
                    block.classList.add('incorrect-block');
                    block.classList.remove('correct-block');
                    correctText.style.display = 'block';
                }
                rationale.style.display = 'block';
            }
        });
        return score;
    }

    function submitExam() {
        clearInterval(timerInterval);
        const finalScore = checkAttempted(true);
        
        // Show Results Dashboard
        const dashboard = document.getElementById('results-dashboard');
        const scoreDisplay = document.getElementById('final-score-display');
        const percentDisplay = document.getElementById('percentage-display');
        
        dashboard.style.display = 'block';
        scoreDisplay.textContent = `${finalScore} / ${questions.length}`;
        percentDisplay.textContent = `Score: ${(finalScore/questions.length * 100).toFixed(1)}%`;
        
        // Disable further input
        document.querySelectorAll('input').forEach(input => input.disabled = true);
        window.scrollTo({ top: 0, behavior: 'smooth' });
        document.getElementById('timer-banner').style.background = "#27ae60";
        document.getElementById('timer-banner').textContent = "Exam Submitted Successfully";
    }
</script>

</body>
</html>
